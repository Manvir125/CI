spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/ci_hospital}
    username: ${SPRING_DATASOURCE_USERNAME:ci_user}
    password: ${SPRING_DATASOURCE_PASSWORD:ci_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: ${MAIL_USERNAME:0a93ae95fbf2bd}
    password: ${MAIL_PASSWORD:16b4b69720ce3f}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ldap:
    embedded:
      base-dn: dc=chpc,dc=es
      ldif: classpath:ldap/users.ldif
      port: 8389
      validation:
        enabled: false
app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  token-expiry-hours: ${TOKEN_EXPIRY_HOURS:72}
  mail-from: noreply@chpc.es

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev_secret_cambia_en_produccion_minimo_32_chars}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

his:
  base-url: ${HIS_BASE_URL:http://localhost:9090}
  timeout-ms: 5000

logging:
  level:
    com.chpc: DEBUG
    org.springframework.security: INFO
    org.springframework.ldap: DEBUG

# ── Custom LDAP Properties (for LdapAuthService) ──
ldap:
  enabled: true
  url: ldap://localhost:8389
  base: dc=chpc,dc=es
  user-search-base: ou=users
  user-search-filter: (uid={0})
  group-search-base: ou=groups
  group-search-filter: (member={0})