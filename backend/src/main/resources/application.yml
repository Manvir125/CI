spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ci_hospital}
    username: ${SPRING_DATASOURCE_USERNAME:ci_user}
    password: ${SPRING_DATASOURCE_PASSWORD:ci_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev_secret_cambia_en_produccion_minimo_32_chars}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

logging:
  level:
    es.chpc: DEBUG
    org.springframework.security: INFO