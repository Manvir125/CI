spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/ci_hospital}
    username: ${SPRING_DATASOURCE_USERNAME:ci_user}
    password: ${SPRING_DATASOURCE_PASSWORD:ci_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: ${MAIL_USERNAME:0a93ae95fbf2bd}
    password: ${MAIL_PASSWORD:16b4b69720ce3f}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ldap:
    embedded:
      base-dn: dc=chpc,dc=es
      ldif: classpath:ldap/users.ldif
      port: 8389
      validation:
        enabled: false
app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  token-expiry-hours: ${TOKEN_EXPIRY_HOURS:72}
  mail-from: noreply@chpc.es
  signatures-path: ${SIGNATURES_PATH:./signatures}
  pdf-path: ${PDF_PATH:./pdfs}
  keystore-path: ${KEYSTORE_PATH:certs/chpc-keystore.p12}
  keystore-password: ${KEYSTORE_PASSWORD:chpc2026}
  keystore-alias: ${KEYSTORE_ALIAS:chpc-sign} 

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:ACb7951f4cada5f3a765c7a5f84b652349}
  auth-token:  ${TWILIO_AUTH_TOKEN:56c70065f292b0463bdbc54d6eb23822}
  from-number: ${TWILIO_FROM_NUMBER:+15206857458}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev_secret_cambia_en_produccion_minimo_32_chars}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

his:
  base-url: ${HIS_BASE_URL:http://localhost:9090}
  timeout-ms: 5000

logging:
  level:
    com.chpc: DEBUG
    org.springframework.security: INFO
    org.springframework.ldap: DEBUG

# ── Active Directory Properties ──
ldap:
  enabled: true
  url: ldaps://dc01.chpcs.local:636
  base: dc=chpcs,dc=local
  domain: chpcs.local
  required-group: DEP02_1536_ACCESO_CIDIGITAL
  user-search-filter: (sAMAccountName={0})
  group-search-base: ""
  group-search-filter: (member={0})