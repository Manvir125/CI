spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/ci_hospital}
    username: ${SPRING_DATASOURCE_USERNAME:ci_user}
    password: ${SPRING_DATASOURCE_PASSWORD:ci_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ldap:
    embedded:
      base-dn: dc=chpc,dc=es
      ldif: classpath:ldap/users.ldif
      port: 8389
      validation:
        enabled: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev_secret_cambia_en_produccion_minimo_32_chars}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

logging:
  level:
    com.chpc: DEBUG
    org.springframework.security: INFO
    org.springframework.ldap: DEBUG

# ── Custom LDAP Properties (for LdapAuthService) ──
ldap:
  enabled: true
  url: ldap://localhost:8389
  base: dc=chpc,dc=es
  user-search-base: ou=users
  user-search-filter: (uid={0})
  group-search-base: ou=groups
  group-search-filter: (member={0})